services:
  # ==================== 基础设施 ====================

  aurora-redis:
    image: redis:7-alpine
    container_name: aurora-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - aurora-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  aurora-postgres:
    image: postgres:16-alpine
    container_name: aurora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aurora}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - aurora-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aurora}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 沙箱服务 ====================

  aurora-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: ${AURORA_SANDBOX_IMAGE:-aurora-sandbox}
    container_name: aurora-sandbox
    restart: "no"
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9222:9222"
      - "127.0.0.1:5901:5901"
    networks:
      - aurora-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/api/supervisor/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==================== 后端 API ====================

  aurora-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: aurora-api
    restart: unless-stopped
    env_file:
      - ${AURORA_ENV_FILE:-.env}
    # 如需动态创建沙箱容器，取消以下注释以挂载 Docker Socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      aurora-redis:
        condition: service_healthy
      aurora-postgres:
        condition: service_healthy
    networks:
      - aurora-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ==================== 前端 UI ====================

  aurora-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    container_name: aurora-ui
    restart: unless-stopped
    depends_on:
      aurora-api:
        condition: service_healthy
    networks:
      - aurora-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==================== Nginx 网关 ====================

  aurora-nginx:
    image: nginx:alpine
    container_name: aurora-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8088}:80"
      # 如需启用 HTTPS，取消以下注释
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL 证书挂载（如需启用 HTTPS，取消以下注释）
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      aurora-ui:
        condition: service_healthy
      aurora-api:
        condition: service_healthy
    networks:
      - aurora-network

# ==================== 数据卷 ====================
volumes:
  redis_data:
    name: ${AURORA_REDIS_VOLUME:-aurora_redis_data}
    driver: local
  postgres_data:
    name: ${AURORA_POSTGRES_VOLUME:-aurora_postgres_data}
    driver: local

# ==================== 网络 ====================
networks:
  aurora-network:
    name: ${AURORA_NETWORK_NAME:-aurora-network}
    driver: bridge
